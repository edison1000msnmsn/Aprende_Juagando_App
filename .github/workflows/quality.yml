name: quality
on:
  pull_request:
  push:
    branches: [main, develop]
jobs:
  web-and-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check apps/web/app.js
      - run: node --check apps/web/server.js
      - run: npm run content:validate
      - run: npm test
